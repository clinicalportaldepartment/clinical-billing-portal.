<form action="https://script.google.com/macros/s/AKfycbz-15hMTkU0XDd8IAXFKJ1WaD_k7fyyIMPgBgsGa8XY7G1ClfVf0YmUd-kahoCV8bWyiQ/exec" method="POST" enctype="multipart/form-data" class="p-6 md:p-10">
    
    <h2 class="text-lg font-bold text-gray-800 mb-6 border-l-4 border-blue-600 pl-3 uppercase">1. Patient & Relative Details</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <input type="text" name="Patient_Name" placeholder="Patient Full Name" required class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
        <input type="text" name="Hospital_ID" placeholder="Hospital ID (TUM-XXXX)" required class="border-2 p-3 rounded-xl">
        <input type="text" name="Spouse_Name" placeholder="Spouse (Sender) Name" required class="border-2 p-3 rounded-xl">
        <input type="email" name="Spouse_Email" placeholder="Spouse Email (For Receipt)" required class="border-2 p-3 rounded-xl">
    </div>

    <h2 class="text-lg font-bold text-gray-800 mb-6 border-l-4 border-blue-600 pl-3 uppercase">2. Settlement Selection</h2>
    <div class="mb-8 bg-gray-50 p-6 rounded-2xl border">
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Payment Type</label>
        <select id="pay-select" name="Payment_Mode" onchange="document.getElementById('logic-input').style.display=(this.value=='Full Settlement')?'none':'block'" class="w-full border-2 p-3 rounded-xl bg-white mb-4">
            <option value="Full Settlement">Full Settlement</option>
            <option value="Advanced Deposit">Advanced Deposit (Partial)</option>
            <option value="Balance Completion">Balance Completion</option>
        </select>
        <div id="logic-input" class="hidden">
            <label class="block text-xs font-bold text-red-500 uppercase mb-1">Enter Balance Due ($)</label>
            <input type="text" name="Balance_Amount" placeholder="e.g. 5,000" class="w-full border-2 border-red-100 p-3 rounded-xl">
        </div>
    </div>

    <div class="bg-gray-900 rounded-3xl p-6 text-white mb-8 border-b-8 border-blue-600 shadow-xl">
        <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs">3. Assets & Verification</h3>
        <div class="space-y-4">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-500 text-[9px] uppercase font-black mb-1">Clinical BTC Address</p>
                <code class="text-green-400 text-xs break-all">bc1qkwxcdnal9pu6qjs07j88s88987x04k3hsasyav</code>
            </div>
            <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-800/40">
                <label class="block font-bold text-blue-400 mb-2 uppercase text-[10px]">Upload Card Photo or BTC Receipt:</label>
                <input type="file" name="Verification_File" required class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white cursor-pointer">
            </div>
        </div>
    </div>

    <button type="submit" class="w-full tum-blue text-white py-5 rounded-2xl font-black text-xl uppercase shadow-lg hover:bg-blue-800 transition-all">Submit for Review</button>
</form>
